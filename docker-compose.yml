services:
  mock-server:
    build: .
    container_name: map-mock-server
    restart: unless-stopped
    # ports:
      # - "8080:8080"
      # - "8082:8082"
      # - "1883:1883"
      # - "8083:8083"
    volumes:
      - ./mock-server/data:/app/data
      - .:/data/xml
    environment:
      - XML_DIR=/data/xml
      - OUTPUT_FILE=/app/data/frames.json
    networks:
      - app
    mem_limit: 256m

networks:
  app:
    external: true
